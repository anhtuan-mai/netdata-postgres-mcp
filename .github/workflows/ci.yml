name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Verify build
        run: go build -o /dev/null ./cmd/netdata-postgres-mcp
        if: runner.os != 'Windows'

      - name: Verify build (Windows)
        run: go build -o nul ./cmd/netdata-postgres-mcp
        if: runner.os == 'Windows'

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: netdata
          POSTGRES_PASSWORD: netdata
          POSTGRES_DB: netdata_metrics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U netdata"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          POSTGRES_DSN: postgres://netdata:netdata@localhost:5432/netdata_metrics_test?sslmode=disable
        run: go test -tags=integration -v -race -count=1 ./internal/store/ ./internal/mcp/

  helm:
    name: Helm Chart Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/netdata-postgres-mcp/

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Run Helm unit tests
        run: helm unittest helm/netdata-postgres-mcp/

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: [lint, test, integration, helm]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o netdata-postgres-mcp-${{ matrix.suffix }} \
            ./cmd/netdata-postgres-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netdata-postgres-mcp-${{ matrix.suffix }}
          path: netdata-postgres-mcp-${{ matrix.suffix }}
          retention-days: 7
