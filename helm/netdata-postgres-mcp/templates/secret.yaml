{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netdata-postgres-mcp.fullname" . }}
  labels:
    {{- include "netdata-postgres-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_DSN: {{ .Values.secret.POSTGRES_DSN | b64enc | quote }}
  {{- if .Values.secret.MCP_AUTH_TOKEN }}
  MCP_AUTH_TOKEN: {{ .Values.secret.MCP_AUTH_TOKEN | b64enc | quote }}
  {{- end }}
{{- end }}
