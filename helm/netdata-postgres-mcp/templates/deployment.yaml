apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netdata-postgres-mcp.fullname" . }}
  labels:
    {{- include "netdata-postgres-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "netdata-postgres-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.config }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "netdata-postgres-mcp.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: mcp
              containerPort: 8765
              protocol: TCP
          env:
            - name: NETDATA_BASE_URL
              value: {{ .Values.env.NETDATA_BASE_URL | quote }}
            - name: COLLECTION_INTERVAL_SECONDS
              value: {{ .Values.env.COLLECTION_INTERVAL_SECONDS | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.env.LOG_FORMAT | quote }}
            - name: RETENTION_DAYS
              value: {{ .Values.env.RETENTION_DAYS | quote }}
            - name: MCP_BIND_ADDR
              value: {{ .Values.env.MCP_BIND_ADDR | quote }}
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "netdata-postgres-mcp.secretName" . }}
                  key: POSTGRES_DSN
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "netdata-postgres-mcp.secretName" . }}
                  key: MCP_AUTH_TOKEN
                  optional: true
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: mcp
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: mcp
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: mcp
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 0 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.config }}
          volumeMounts:
            - name: config
              mountPath: /etc/netdata-postgres-mcp
              readOnly: true
          {{- end }}
      {{- if .Values.config }}
      volumes:
        - name: config
          configMap:
            name: {{ include "netdata-postgres-mcp.configmapName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
