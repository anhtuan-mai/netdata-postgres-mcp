# Default values for netdata-postgres-mcp.

replicaCount: 1

image:
  repository: ghcr.io/anhtuan-mai/netdata-postgres-mcp
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Environment variables for the sidecar container.
env:
  # -- Base URL of the Netdata agent API.
  NETDATA_BASE_URL: "http://netdata:19999"
  # -- PostgreSQL connection string. **Required** — set via secret or values.
  POSTGRES_DSN: ""
  # -- How often (seconds) to collect metrics from Netdata.
  COLLECTION_INTERVAL_SECONDS: "60"
  # -- Log level (debug, info, warn, error).
  LOG_LEVEL: "info"
  # -- Log format (text, json).
  LOG_FORMAT: "text"
  # -- Number of days to retain metrics in PostgreSQL.
  RETENTION_DAYS: "30"
  # -- Address the MCP server binds to.
  MCP_BIND_ADDR: "0.0.0.0:8765"

# -- Existing secret name containing POSTGRES_DSN and optional MCP_AUTH_TOKEN.
# If set, the chart will not create its own Secret.
existingSecret: ""

# -- Values used when the chart creates its own Secret (existingSecret is empty).
secret:
  # -- PostgreSQL connection string stored in the Secret.
  POSTGRES_DSN: ""
  # -- Optional MCP authentication token.
  MCP_AUTH_TOKEN: ""

service:
  type: ClusterIP
  port: 8765

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Liveness and readiness probe configuration.
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# -- Optional ConfigMap content injected as config.yaml.
config: {}

# -- ServiceMonitor for Prometheus Operator.
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  labels: {}

# -- PodDisruptionBudget.
pdb:
  enabled: false
  minAvailable: 1

# -- Security context applied to the pod.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

# -- Security context applied to the container.
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podLabels: {}
